name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node-version:
          - 20.19.x
          - 22.x

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Verify repository
      run: npm run verify:repository

    - name: Lint check
      run: npm run editvcs:lint

    - name: Build all packages
      run: npm run editvcs:build

    - name: Run Tests
      run: npm run editvcs:test

    - name: Package CEP panel (unsigned)
      run: npm run package:cep:unsigned

    - name: Run Companion Smoke Test
      run: node scripts/companion-smoke-test.js
